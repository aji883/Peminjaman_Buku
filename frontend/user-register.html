<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota - PerpusOnline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="login-page">
        <!-- Left Branding -->
        <div class="login-left">
            <div class="brand">
                <i class="fas fa-users"></i>
                <h1>Bergabung Sekarang!</h1>
                <p>Buat akun anggota untuk dapat meminjam buku secara online dan mengakses perpustakaan digital kami 24/7.</p>
            </div>
        </div>

        <!-- Right Form -->
        <div class="login-right">
            <div class="login-box">
                <h2>Pendaftaran Anggota</h2>
                <p class="subtitle">Isi data diri Anda untuk membuat akun</p>
                
                <div id="alertMessage" class="alert"></div>

                <form id="userRegisterForm">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nama" class="form-control" required placeholder="Budi Santoso">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Alamat Email</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" required placeholder="budi@contoh.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••" minlength="6">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Konfirmasi Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" class="form-control" required placeholder="••••••••" minlength="6">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem; padding: 0.85rem;">
                        Buat Akun <i class="fas fa-user-plus"></i>
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-medium);">
                    Sudah punya akun? <a href="user-login.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login di sini</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        document.getElementById('userRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('alertMessage');
            
            if (password !== confirmPassword) {
                alertBox.textContent = 'Konfirmasi password tidak cocok!';
                alertBox.className = 'alert error';
                return;
            }

            try {
                const data = await fetchAPI('/auth/user/register', {
                    method: 'POST',
                    body: JSON.stringify({ nama, email, password })
                });
                
                alertBox.textContent = data.message;
                alertBox.className = 'alert success';
                
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'user-login.html';
                }, 2000);
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.className = 'alert error';
            }
        });
    </script>
</body>
</html>
