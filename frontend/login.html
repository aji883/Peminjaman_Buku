<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - PerpusOnline</title>
    <meta name="description" content="Login sebagai admin perpustakaan untuk mengelola buku dan anggota.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="login-page">
        <!-- Left Branding -->
        <div class="login-left">
            <div class="brand">
                <i class="fas fa-book-open"></i>
                <h1>PerpusOnline.</h1>
                <p>Sistem Informasi Perpustakaan Digital untuk pengelolaan buku yang lebih mudah dan modern.</p>
            </div>
        </div>

        <!-- Right Login Form -->
        <div class="login-right">
            <div class="login-box">
                <h2>Admin Panel</h2>
                <p class="subtitle">Masuk untuk mengelola perpustakaan</p>
                
                <div id="alertMessage" class="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" required placeholder="admin@perpustakaan.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem; padding: 0.85rem;">
                        Masuk ke Dashboard <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-light);">
                    <a href="index.html" style="color: var(--accent); text-decoration: none;">&larr; Kembali ke Katalog</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertMessage');
            
            try {
                const data = await fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('admin_name', data.admin.nama);
                
                window.location.href = './admin/dashboard.html';
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.className = 'alert error';
            }
        });
    </script>
</body>
</html>
