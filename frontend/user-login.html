<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Anggota - PerpusOnline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="login-page">
        <!-- Left Branding -->
        <div class="login-left">
            <div class="brand">
                <i class="fas fa-book-reader"></i>
                <h1>Halo, Anggota!</h1>
                <p>Silakan masuk untuk mulai meminjam buku dan menjelajahi koleksi terbaru dari PerpusOnline.</p>
            </div>
        </div>

        <!-- Right Login Form -->
        <div class="login-right">
            <div class="login-box">
                <h2>Selamat Datang</h2>
                <p class="subtitle">Masuk dengan akun anggota Anda</p>
                
                <div id="alertMessage" class="alert"></div>

                <form id="userLoginForm">
                    <div class="form-group">
                        <label for="email">Alamat Email</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" required placeholder="user@contoh.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem; padding: 0.85rem;">
                        Masuk ke Katalog <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-medium);">
                    Belum punya akun? <a href="user-register.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Daftar di sini</a>
                </p>
                
                <p style="text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--text-light);">
                    <a href="login.html" style="color: var(--text-light); text-decoration: underline;">Login sebagai Admin</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Redirect if already logged in as user
        if (localStorage.getItem('user_token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertMessage');
            
            try {
                // We fetchAPI to user login route
                const data = await fetchAPI('/auth/user/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                // Store specifically for user
                localStorage.setItem('user_token', data.token);
                localStorage.setItem('user_name', data.user.nama);
                
                // Redirect to catalog
                window.location.href = 'index.html';
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.className = 'alert error';
            }
        });
    </script>
</body>
</html>
